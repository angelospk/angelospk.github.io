- id: "project-secretary"
  title: "Project Secretary"
  subtitle: "Smart Secretary for a GitHub Backlog"
  type: "personal"
  category: "ai"
  weight: 9
  period:
    start: "2026"
    end: null
  description: |
    A library and tool that acts as a smart secretary for one or more GitHub repos.
    It remembers every issue, PR, comment, and Project item, connects related work
    even across repo boundaries, and enriches new issues with relevant history plus
    grounded codebase context.
  context:
    problem: |
      In a busy backlog the same idea gets filed twice, the issue describing a feature
      lives in one repo while the code that implements it lives in another, and nobody
      has time to wire those connections by hand.
    solution: |
      Built a memory backbone over SurrealDB that syncs issues, PRs, comments, and
      Project v2 items, with a local-embeddings semantic layer and a reranker that
      classifies items as duplicate, overlap, prior context, or noise.
  highlights:
    - text: "Cross-Repo Memory"
      detail: "Indexes several repos in one graph store so a frontend issue can surface the backend PR that implements it."
    - text: "Semantic Related Work"
      detail: "Local embeddings (fastembed/ONNX, no torch) plus a heuristic reranker using labels, edges, and milestones."
    - text: "Grounded Issue Comments"
      detail: "Writes an idempotent, sticky comment with related history and DeepWiki file-level context to help resolve an issue."
    - text: "Auto-Labels & Backlog Help"
      detail: "Embeddings-based categorization to suggest labels and surface related issues/PRs across the project backlog."
  links:
    - url: "https://github.com/angelospk/project_secretary"
      label: "GitHub"
  technologies:
    - "Python"
    - "SurrealDB"
    - "Embeddings / fastembed"
    - "GitHub API"
    - "Vector Search"
  featured: true

