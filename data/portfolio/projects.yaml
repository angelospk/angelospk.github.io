- id: "find-doctors-server"
  title: "FindDoctors Aggregator Server"
  subtitle: "Unified Public Health Appointment Search"
  type: "personal"
  category: "backend"
  weight: 10
  period:
    start: "2026"
    end: null
  description: |
    High-performance Go backend that aggregates appointment availability from 
    finddoctors.gov.gr, making it easier to discover where and when public health 
    appointments are available across hospitals and primary care centers.
  context:
    problem: |
      The official platform makes it difficult to search across different public 
      health entities, regions, and appointment dates at once.
    solution: |
      Built a concurrent aggregator API that searches multiple entities in parallel, 
      returns the soonest available appointments, and is designed to power a future 
      patient-facing UI for booking faster when availability exists.
  highlights:
    - text: "Unified Smart Search"
      detail: "Combines nationwide, proximity, hospital, and primary care center search into a single endpoint."
    - text: "Parallel Scanner Engine"
      detail: "Uses a concurrent worker pool to probe health units for first available slots with low latency."
    - text: "Actionable Capacity Reports"
      detail: "Reports fill rates and earliest available dates per specialty for hospital departments."
    - text: "Privacy-first Discovery"
      detail: "Read-only, stateless search layer that does not store user cookies or appointment session data."
  links:
    - url: "https://github.com/angelospk/find_doctors_server"
      label: "GitHub"
  technologies:
    - "Go"
    - "REST API"
    - "Concurrent Workers"
    - "TypeScript Types"
    - "TDD"
  featured: true

