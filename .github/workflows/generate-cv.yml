name: Generate CV PDF

on:
  push:
    branches: [main]
    paths:
      - 'cv/generate_tailored_cv.rb'
      - 'data/portfolio/**'
      - 'data/portfolio_backup.yaml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Job/application context for tailoring'
        required: false
        default: 'General full-stack developer CV'
      tips:
        description: 'Extra tailoring tips'
        required: false
        default: ''

jobs:
  build-cv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Compile CV to PDF
        run: |
          ruby cv/generate_tailored_cv.rb \
            --target "${{ github.event.inputs.target || 'General full-stack developer CV' }}" \
            --tips "${{ github.event.inputs.tips || '' }}" \
            --output-dir cv \
            --basename angelos-papamichail-cv

      - name: Commit and push PDF
        run: |
          git config --local user.email "rovas450@gmail.com"
          git config --local user.name "angelospk"
          git add cv/angelos-papamichail-cv.pdf
          git diff --staged --quiet || git commit -m "📄 Auto-generate CV PDF [skip ci]"
          git push
